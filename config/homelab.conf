# homelab.conf — Configuration for homelab CLI
# This file is sourced by the homelab tool.
# Edit values below to match your environment.

# ─── Storage ─────────────────────────────────────────────────────────
# Root path for shared data
DATA_ROOT="/srv/data"

# Expected subdirectories under DATA_ROOT
# Used by 'homelab storage repair' to create missing folders
DATA_DIRS="media downloads documents photos backups"

# ─── Services ────────────────────────────────────────────────────────
# Map container VMIDs to service names (vmid:name, use underscores for spaces, or comma-separated lists for multiple users)
SERVICE_NAMES="100:Plex 101:Homer 102:gateway,aria2 103:NextExplorer"

# Map container VMIDs to service ports
SERVICE_PORTS="100:32400 101:8010 102:8080 103:3000"

# ─── ACL ─────────────────────────────────────────────────────────────
# Default UID offset for unprivileged LXC containers
# Standard Proxmox default is 100000
ACL_UID_OFFSET="100000"
